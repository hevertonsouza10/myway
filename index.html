<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="My Way Treinamentos">
  <title>My Way Treinamentos</title>
  <style>
    :root {
      --blue: #173f78;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--blue);
    }

    .logo {
      width: min(76vw, 560px);
      height: auto;
      display: block;
      animation: reveal 900ms ease-out both;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <img class="logo" src="marca/Logo---myway_Prancheta-10_2026-1-22_v30.1.0.png" alt="My Way - lidere suas escolhas">
</body>
</html>
